<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 및 세팅 선택기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
            background-color: #1a1d24; /* 어두운 게임 UI 스타일 배경 */
            color: #ffffff;
        }

        h2 {
            color: #e2e8f0;
            font-size: 20px;
            border-left: 4px solid #3b82f6;
            padding-left: 10px;
            margin-bottom: 20px;
        }

        /* 캐릭터 목록 스크롤 박스 */
        .scroll-box {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 12px;
            background: #111827;
        }
        /* 스크롤바 커스텀 */
        .scroll-box::-webkit-scrollbar { width: 8px; }
        .scroll-box::-webkit-scrollbar-track { background: #111827; }
        .scroll-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .scroll-box::-webkit-scrollbar-thumb:hover { background: #4b5563; }

        .list-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .item-card {
            position: relative;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 6px;
            background: #1e293b;
            cursor: pointer;
            text-align: center;
            width: 90px;
            transition: all 0.2s ease;
            overflow: hidden;
            user-select: none;
        }
        .item-card:hover { border-color: #475569; }
        .item-card.selected {
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
            background: #1e3a8a;
        }
        .item-card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background-color: #334155;
        }

        .item-name {
            margin-top: 6px;
            font-size: 12px;
            font-weight: bold;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .select-badge {
            position: absolute;
            top: 3px;
            left: 3px;
            background: rgba(59, 130, 246, 0.9);
            color: white;
            padding: 1px 4px;
            font-size: 10px;
            border-radius: 3px;
            font-weight: bold;
            display: none;
            z-index: 10;
        }
        .item-card.selected .select-badge { display: block; }

        /* 선택된 캐릭터 배치 구역 */
        .selected-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .slot-card {
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            background: #1e293b;
            min-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .slot-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }
        .slot-header img {
            width: 45px;
            height: 45px;
            border-radius: 6px;
            object-fit: cover;
        }
        .slot-title { font-size: 16px; font-weight: bold; color: #3b82f6; }

        /* 세팅 그룹 공통 스타일 */
        .setting-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #111827;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #1e293b;
        }
        .section-label {
            font-size: 12px;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .row-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 8px;
        }
        .row-item.vertical {
            flex-direction: column;
            align-items: flex-start;
        }
        .row-item label {
            font-size: 13px;
            color: #94a3b8;
            min-width: 45px;
        }

        /* 반지 전용 이미지 컨테이너 */
        .img-container {
            width: 36px;
            height: 36px;
            border: 1px dashed #334155;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            overflow: hidden;
            flex-shrink: 0;
        }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .placeholder-txt { font-size: 10px; color: #475569; text-align: center; }

        .select-group {
            display: flex;
            gap: 6px;
            flex-grow: 1;
            width: 100%;
        }
        .opt-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            width: 100%;
        }

        select, input[type="text"] {
            padding: 7px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
            outline: none;
            font-size: 12px;
            box-sizing: border-box;
        }
        select { cursor: pointer; }
        select:focus, input[type="text"]:focus { border-color: #3b82f6; }
        
        /* 인풋창 스타일 */
        input[type="text"] {
            width: 100%;
            background: #0f172a;
        }
        input[type="text"]::placeholder {
            color: #475569;
        }

        /* 선택창 너비 비율 조정 */
        .main-select { flex: 2; min-width: 110px; }
        .full-select { flex: 1; width: 100%; }

        /* 스킬 순서 섹션 스타일 */
        .skill-order-section {
            margin-top: 30px;
            background: #1e293b;
            border: 2px solid #3b82f6;
            padding: 20px;
            border-radius: 12px;
            display: none; /* 기본 숨김 */
        }
        .skill-order-section h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 16px;
            color: #3b82f6;
        }

        #placeholderText { color: #64748b; font-size: 14px; margin-top: 10px; }
        hr { border: 0; height: 1px; background: #334155; margin: 30px 0; }
    </style>
</head>
<body>

    <h2>1. 캐릭터 선택 (최대 5명)</h2>
    <div class="scroll-box">
        <div class="list-container" id="characterPool"></div>
    </div>

    <hr>

    <h2>2. 선택된 캐릭터 및 세팅 설정</h2>
    <div class="selected-container" id="selectedSlots">
        <p id="placeholderText">상단의 캐릭터를 클릭하면 아래에 상세 세팅창이 나타납니다.</p>
    </div>

    <!-- 스킬 순서 입력 칸 (조건부 노출) -->
    <div class="skill-order-section" id="skillOrderSection">
        <h3>⚔️ 스킬 순서</h3>
        <input type="text" id="skillOrderInput" placeholder="선택된 조합의 스킬 순서를 입력하세요. (예: 파이 1 -> 태오 2 -> 연희 2)">
    </div>

    <script>
        // 원본 캐릭터 데이터
        const characterData = [
            { name: "관우", img: "관우.png" }, { name: "나타", img: "나타.png" }, { name: "녹스", img: "녹스.png" },
            { name: "니아", img: "니아.png" }, { name: "데이지", img: "데이지.png" }, { name: "델론즈", img: "델론즈.png" },
            { name: "돼오", img: "돼오.png" }, { name: "라드그리드", img: "라드그리드.png" }, { name: "라이언", img: "라이언.png" },
            { name: "란드그리드", img: "란드그리드.png" }, { name: "레오", img: "레오.png" }, { name: "레이첼", img: "레이첼.png" },
            { name: "루디", img: "루디.png" }, { name: "루리", img: "루리.png" }, { name: "룩", img: "룩.png" },
            { name: "리나", img: "리나.png" }, { name: "린", img: "린.png" }, { name: "멜키르", img: "멜키르.png" },
            { name: "미스트", img: "미스트.png" }, { name: "미호", img: "미호.png" }, { name: "바네사", img: "바네사.png" },
            { name: "발리스타", img: "발리스타.png" }, { name: "백각", img: "백각.png" }, { name: "백룡", img: "백룡.png" },
            { name: "벨리카", img: "벨리카.png" }, { name: "브란즈브란셀", img: "브란즈브란셀.png" }, { name: "블랙로즈", img: "블랙로즈.png" },
            { name: "비담", img: "비담.png" }, { name: "비스킷", img: "비스킷.png" }, { name: "세인", img: "세인.png" },
            { name: "소교", img: "소교.png" }, { name: "손오공", img: "손오공.png" }, { name: "스쿨드", img: "스쿨드.png" },
            { name: "스파이크", img: "스파이크.png" }, { name: "실베스타", img: "실베스타.png" }, { name: "아라곤", img: "아라곤.png" },
            { name: "아멜리아", img: "아멜리아.png" }, { name: "아일린", img: "아일린.png" }, { name: "에스파다", img: "에스파다.png" },
            { name: "에이스", img: "에이스.png" }, { name: "엘리스", img: "엘리스.png" }, { name: "엘리시아", img: "엘리시아.png" },
            { name: "여포", img: "여포.png" }, { name: "연희", img: "연희.png" }, { name: "오를리", img: "오를리.png" },
            { name: "유신", img: "유신.png" }, { name: "제이브", img: "제이브.png" }, { name: "제인", img: "제인.png" },
            { name: "쥬리", img: "쥬리.png" }, { name: "쥬피", img: "쥬피.png" }, { name: "지크", img: "지크.png" },
            { name: "진", img: "진.png" }, { name: "챈슬러", img: "챈슬러.png" }, { name: "초선", img: "초선.png" },
            { name: "카구라", img: "카구라.png" }, { name: "카르마", img: "카르마.png" }, { name: "카일", img: "카일.png" },
            { name: "칼 헤론", img: "칼 헤론.png" }, { name: "콜트", img: "콜트.png" }, { name: "크리스", img: "크리스.png" },
            { name: "클라한", img: "클라한.png" }, { name: "클레미스", img: "클레미스.png" }, { name: "키리엘", img: "키리엘.png" },
            { name: "타카", img: "타카.png" }, { name: "태오", img: "태오.png" }, { name: "트루드", img: "트루드.png" },
            { name: "파스칼", img: "파스칼.png" }, { name: "팔라누스", img: "팔라누스.png" }, { name: "풍연", img: "풍연.png" },
            { name: "프레이야", img: "프레이야.png" }, { name: "플라튼", img: "플라튼.png" }, { name: "헤브니아", img: "헤브니아.png" },
            { name: "파이", img: "파이.png" }, { name: "로지", img: "로지.png" }, { name: "겔리두스", img: "겔리두스.png" },
            { name: "밀리아", img: "밀리아.png" }, { name: "레긴레이프", img: "레긴레이프.png" }, { name: "성진우", img: "성진우.png" },
            { name: "오목", img: "오목.png" }, { name: "아킬라", img: "아킬라.png" }
        ];

        // 정렬용 기준 명단
        const targetOrder = [
            "파이", "로지", "겔리두스", "밀리아", "쥬리", "델론즈", "클레미스", "실베스타", "스쿨드", "태오",
            "카구라", "카일", "연희", "바네사", "키리엘", "루디", "라드그리드", "플라튼", "크리스", "제이브",
            "스파이크", "카르마", "손오공", "라이언", "린", "비스킷", "에이스", "레이첼", "콜트", "여포",
            "브란즈브란셀", "란드그리드", "멜키르", "오를리", "아일린", "트루드", "클라한", "칼헤론", "프레이야", "엘리시아",
            "팔라누스", "레긴레이프", "성진우", "오목", "아킬라", "미스트", "나타", "비담", "세인", "발리스타",
            "타카", "아멜리아", "백룡", "유신", "벨리카", "루리", "에스파다", "파스칼", "데이지", "미호",
            "녹스", "룩", "아라곤", "리나", "엘리스", "니아", "지크", "챈슬러", "소교", "백각",
            "초선", "관우", "돼오"
        ];

        characterData.sort((a, b) => {
            let indexA = targetOrder.indexOf(a.name);
            let indexB = targetOrder.indexOf(b.name);
            if (indexA === -1) indexA = 999;
            if (indexB === -1) indexB = 999;
            return indexA !== indexB ? indexA - indexB : a.name.localeCompare(b.name, 'ko');
        });

        characterData.forEach((char, index) => char.id = `char_${index}`);

        const ringList = [{ name: "권능", img: "권능.png" }, { name: "불사", img: "불사.png" }, { name: "부활", img: "부활.png" }];
        const equipmentTypes = ["선봉장", "추적자", "성기사", "수문장", "수호자", "암살자", "복수자", "주술사", "조율자"];
        const weaponOptions = ["약공", "치확", "모공", "방어력", "생명력", "효과적중"];
        const armorOptions = ["받피감", "모공", "효과저항"];
        const specialOptions = ["효과적중", "효과저항", "모든공격력", "피해증폭", "파쇄", "탄성", "재생"];

        let selectedCharacters = [];
        let savedSkillOrder = ""; // 스킬 순서 텍스트 전역 저장

        const characterPool = document.getElementById('characterPool');
        const selectedSlots = document.getElementById('selectedSlots');
        const placeholderText = document.getElementById('placeholderText');
        const skillOrderSection = document.getElementById('skillOrderSection');
        const skillOrderInput = document.getElementById('skillOrderInput');

        function initCharacterPool() {
            characterPool.innerHTML = '';
            characterData.forEach(char => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.dataset.id = char.id;
                card.innerHTML = `
                    <span class="select-badge">✓</span>
                    <img src="${char.img}" alt="${char.name}" onerror="this.style.opacity='0.3';">
                    <div class="item-name">${char.name}</div>
                `;
                characterPool.appendChild(card);
            });
        }

        characterPool.addEventListener('click', (e) => {
            const card = e.target.closest('.item-card');
            if (!card) return;

            const charId = card.dataset.id;
            const isExist = selectedCharacters.find(c => c.id === charId);

            if (isExist) {
                selectedCharacters = selectedCharacters.filter(c => c.id !== charId);
                card.classList.remove('selected');
            } else {
                if (selectedCharacters.length >= 5) {
                    alert("캐릭터는 최대 5명까지만 선택할 수 있습니다.");
                    return;
                }
                const targetOrigin = characterData.find(c => c.id === charId);
                selectedCharacters.push({
                    id: targetOrigin.id, name: targetOrigin.name, img: targetOrigin.img,
                    ring1: "", ring1_img: "", ring2: "", ring2_img: "",
                    equip_type: "", 
                    wp_opt1: "", wp_opt2: "", 
                    am_opt1: "", am_opt2: "",
                    equip_text: "", // 장비 텍스트 칸 저장용
                    special_opt: ""
                });
                card.classList.add('selected');
            }
            renderSlots();
            checkSkillOrderVisibility();
        });

        function renderSlots() {
            if (selectedCharacters.length === 0) {
                selectedSlots.innerHTML = '';
                selectedSlots.appendChild(placeholderText);
                return;
            }

            selectedSlots.innerHTML = '';

            selectedCharacters.forEach(char => {
                const slotCard = document.createElement('div');
                slotCard.className = 'slot-card';

                let r1Opts = `<option value="" data-img="">-- 선택 --</option>`;
                ringList.forEach(r => r1Opts += `<option value="${r.name}" data-img="${r.img}" ${char.ring1===r.name?'selected':''}>${r.name}</option>`);
                let r2Opts = `<option value="" data-img="">-- 선택 --</option>`;
                ringList.forEach(r => r2Opts += `<option value="${r.name}" data-img="${r.img}" ${char.ring2===r.name?'selected':''}>${r.name}</option>`);

                // 통합 장비 종류 바인딩
                let eqOpts = `<option value="">-- 장비 세트 선택 --</option>`;
                equipmentTypes.forEach(t => eqOpts += `<option value="${t}" ${char.equip_type===t?'selected':''}>${t}</option>`);

                // 무기 옵션 1, 2 바인딩
                let wp1Opts = `<option value="">-- 무기 옵션 1 --</option>`;
                weaponOptions.forEach(o => wp1Opts += `<option value="${o}" ${char.wp_opt1===o?'selected':''}>${o}</option>`);
                let wp2Opts = `<option value="">-- 무기 옵션 2 --</option>`;
                weaponOptions.forEach(o => wp2Opts += `<option value="${o}" ${char.wp_opt2===o?'selected':''}>${o}</option>`);

                // 방어구 옵션 1, 2 바인딩
                let am1Opts = `<option value="">-- 방어구 옵션 1 --</option>`;
                armorOptions.forEach(o => am1Opts += `<option value="${o}" ${char.am_opt1===o?'selected':''}>${o}</option>`);
                let am2Opts = `<option value="">-- 방어구 옵션 2 --</option>`;
                armorOptions.forEach(o => am2Opts += `<option value="${o}" ${char.am_opt2===o?'selected':''}>${o}</option>`);

                let spOpts = `<option value="">-- 전용 장비 옵션 선택 --</option>`;
                specialOptions.forEach(o => spOpts += `<option value="${o}" ${char.special_opt===o?'selected':''}>${o}</option>`);

                slotCard.innerHTML = `
                    <div class="slot-header">
                        <img src="${char.img}" alt="${char.name}" onerror="this.style.display='none';">
                        <div class="slot-title">${char.name} 세팅</div>
                    </div>
                    
                    <!-- Accessory 섹션 -->
                    <div class="setting-section">
                        <div class="section-label">Accessory</div>
                        <div class="row-item">
                            <label>반지 1</label>
                            <div class="img-container">
                                <span class="placeholder-txt" id="txt-${char.id}-r1" style="${char.ring1_img?'display:none;':'display:block;'}">${char.ring1?'No Img':'Empty'}</span>
                                <img src="${char.ring1_img || ''}" id="img-${char.id}-r1" style="${char.ring1_img?'display:block;':'display:none;'}">
                            </div>
                            <div class="select-group">
                                <select class="main-select" onchange="updateRingData(this, '${char.id}', 'r1')">${r1Opts}</select>
                            </div>
                        </div>
                        <div class="row-item">
                            <label>반지 2</label>
                            <div class="img-container">
                                <span class="placeholder-txt" id="txt-${char.id}-r2" style="${char.ring2_img?'display:none;':'display:block;'}">${char.ring2?'No Img':'Empty'}</span>
                                <img src="${char.ring2_img || ''}" id="img-${char.id}-r2" style="${char.ring2_img?'display:block;':'display:none;'}">
                            </div>
                            <div class="select-group">
                                <select class="main-select" onchange="updateRingData(this, '${char.id}', 'r2')">${r2Opts}</select>
                            </div>
                        </div>
                    </div>

                    <!-- Equipment 섹션 (통합 구조 및 옵션 확장 + 텍스트 칸) -->
                    <div class="setting-section">
                        <div class="section-label">Equipment (통합)</div>
                        <div class="row-item">
                            <label>장 비</label>
                            <div class="select-group">
                                <select class="full-select" onchange="updateEquipType(this, '${char.id}')">${eqOpts}</select>
                            </div>
                        </div>
                        <div class="row-item vertical">
                            <div class="opt-grid">
                                <select onchange="updateEquipOpt(this, '${char.id}', 'wp_opt1')">${wp1Opts}</select>
                                <select onchange="updateEquipOpt(this, '${char.id}', 'wp_opt2')">${wp2Opts}</select>
                            </div>
                            <div class="opt-grid">
                                <select onchange="updateEquipOpt(this, '${char.id}', 'am_opt1')">${am1Opts}</select>
                                <select onchange="updateEquipOpt(this, '${char.id}', 'am_opt2')">${am2Opts}</select>
                            </div>
                        </div>
                        <!-- 장비 커스텀 텍스트 칸 -->
                        <div class="row-item">
                            <input type="text" placeholder="장비 커스텀 메모 입력" value="${char.equip_text || ''}" oninput="updateEquipText(this, '${char.id}')">
                        </div>
                    </div>

                    <!-- Exclusive Equipment 섹션 -->
                    <div class="setting-section">
                        <div class="section-label">Exclusive Equipment</div>
                        <div class="row-item">
                            <label>전 용</label>
                            <div class="select-group">
                                <select class="full-select" onchange="updateSpecialOpt(this, '${char.id}')">${spOpts}</select>
                            </div>
                        </div>
                    </div>
                `;
                selectedSlots.appendChild(slotCard);
            });
        }

        // 스킬 순서 칸의 노출 여부 제어 함수
        function checkSkillOrderVisibility() {
            const count = selectedCharacters.length;
            if (count === 3 || count === 5) {
                skillOrderSection.style.display = "block";
                skillOrderInput.value = savedSkillOrder; // 기존에 입력했던 값 유지
            } else {
                skillOrderSection.style.display = "none";
            }
        }

        // 스킬 순서 텍스트 실시간 저장
        skillOrderInput.addEventListener('oninput', (e) => {
            savedSkillOrder = e.target.value;
        });
        // 브라우저 호환성 보완용 event listener 추가
        skillOrderInput.addEventListener('input', (e) => {
            savedSkillOrder = e.target.value;
        });

        // 데이터 이벤트 헨들러들
        function updateRingData(selectEl, charId, slotKey) {
            const opt = selectEl.options[selectEl.selectedIndex];
            const charObj = selectedCharacters.find(c => c.id === charId);
            charObj[slotKey === 'r1' ? 'ring1' : 'ring2'] = selectEl.value;
            charObj[slotKey === 'r1' ? 'ring1_img' : 'ring2_img'] = opt.dataset.img;

            const img = document.getElementById(`img-${charId}-${slotKey}`);
            const txt = document.getElementById(`txt-${charId}-${slotKey}`);
            if (opt.dataset.img) {
                img.src = opt.dataset.img; img.style.display = 'block'; txt.style.display = 'none';
            } else if (selectEl.value !== "") {
                img.style.display = 'none'; txt.innerText = "No Img"; txt.style.display = 'block';
            } else {
                img.style.display = 'none'; txt.innerText = "Empty"; txt.style.display = 'block';
            }
        }

        function updateEquipType(selectEl, charId) {
            const charObj = selectedCharacters.find(c => c.id === charId);
            charObj.equip_type = selectEl.value;
        }

        function updateEquipOpt(selectEl, charId, key) {
            const charObj = selectedCharacters.find(c => c.id === charId);
            charObj[key] = selectEl.value;
        }

        function updateEquipText(inputEl, charId) {
            const charObj = selectedCharacters.find(c => c.id === charId);
            charObj.equip_text = inputEl.value;
        }

        function updateSpecialOpt(selectEl, charId) {
            const charObj = selectedCharacters.find(c => c.id === charId);
            charObj.special_opt = selectEl.value;
        }

        initCharacterPool();
    </script>
</body>
</html>
